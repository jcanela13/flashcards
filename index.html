<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Radiofísica">
<title>Radiof&#237;sica Hospitalaria</title>
<style>
:root{
  --bg:#0f0f0f;
  --sur:#181818;
  --sur2:#202020;
  --crd:#1c1c1c;
  --crdb:#141414;
  --txt:#f0f0f0;
  --txt2:#a0a0a0;
  --txt3:#585858;
  --brd:#2a2a2a;
  --brd2:#333;
  --acc:#ffffff;
  --acc-dim:rgba(255,255,255,.08);
  --acc-border:rgba(255,255,255,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}
#home{min-height:100dvh;overflow-y:auto;background:var(--bg);padding-bottom:env(safe-area-inset-bottom);}
#study{position:fixed;inset:0;overflow:hidden;background:var(--bg);padding-bottom:env(safe-area-inset-bottom);}
#done{position:fixed;inset:0;overflow:hidden;background:var(--bg);align-items:center;justify-content:center;padding:40px 24px;padding-bottom:calc(40px + env(safe-area-inset-bottom));text-align:center;}

/* ── HOME HEADER ── */
.home-top{padding:40px 22px 28px;border-bottom:1px solid var(--brd);}
.app-label{
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:10px;
}
.app-title{
  font-size:clamp(26px,7vw,36px);font-weight:800;letter-spacing:-.02em;
  color:var(--txt);line-height:1.05;margin-bottom:6px;
}
.app-sub{font-size:13px;color:var(--txt3);}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:1px;background:var(--brd);border-bottom:1px solid var(--brd);}
.stat{flex:1;background:var(--bg);padding:16px 12px;text-align:center;}
.stat-n{font-size:20px;font-weight:700;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums;}
.stat-l{font-size:9px;color:var(--txt3);margin-top:4px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}

/* ── RATING COUNTERS ── */
.rating-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  gap:1px;background:var(--brd);
  border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);
}
.rcell{background:var(--bg);padding:14px 8px;text-align:center;}
.rcell-n{font-size:20px;font-weight:700;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums;}
.rcell-dot{font-size:10px;margin-bottom:3px;}
.rcell-l{font-size:9px;color:var(--txt3);margin-top:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}

/* ── STUDY ALL BUTTON ── */
.study-all-wrap{padding:16px 22px;}
.btn-study-all{
  width:100%;padding:15px 20px;
  background:var(--txt);border:none;border-radius:12px;
  color:var(--bg);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-study-all:active{opacity:.85;}
.btn-study-all .cnt{
  background:rgba(0,0,0,.15);border-radius:100px;
  padding:2px 9px;font-size:11px;font-weight:600;
}

/* ── TOPIC LIST ── */
.topics-label{
  padding:20px 22px 8px;
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);
}
.topic-list{padding:0 22px 48px;display:flex;flex-direction:column;gap:1px;background:var(--brd);}
/* wrap needed so gap+background trick works for dividers */
.topic-list-inner{display:flex;flex-direction:column;}

.topic-row{
  background:var(--bg);
  padding:14px 16px;
  display:flex;align-items:center;gap:13px;
  text-align:left;width:100%;font-family:inherit;color:var(--txt);
  border:none;cursor:pointer;
}
.topic-row.has-cards:active{background:var(--sur);}
.topic-row.empty{opacity:.4;cursor:default;}
.topic-reset{
  background:transparent;border:1px solid var(--brd);border-radius:8px;
  color:var(--txt3);font-size:10px;font-weight:600;font-family:inherit;
  padding:5px 9px;cursor:pointer;flex-shrink:0;white-space:nowrap;
}
.topic-reset:active{background:var(--sur2);color:var(--txt);}

.topic-num{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
  font-variant-numeric:tabular-nums;
  background:var(--sur2);color:var(--txt2);
}
.topic-row.has-cards .topic-num{background:var(--acc);color:var(--bg);}
.topic-info{flex:1;min-width:0;}
.topic-name{font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topic-meta{font-size:11px;color:var(--txt3);margin-top:2px;}
.topic-arrow{font-size:16px;color:var(--txt3);flex-shrink:0;}

/* ── STUDY HEADER ── */
.shdr{
  padding:14px 18px 12px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--brd);flex-shrink:0;
}
.btn-back{
  background:var(--sur);border:1px solid var(--brd);border-radius:9px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;color:var(--txt2);flex-shrink:0;font-family:inherit;
}
.deck-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt2);}
.prog-txt{font-size:12px;color:var(--txt3);flex-shrink:0;font-variant-numeric:tabular-nums;}
.prog-wrap{height:2px;background:var(--brd);flex-shrink:0;}
.prog-bar{height:100%;background:var(--txt);transition:width .35s ease;width:0%;}

/* ── CARD ── */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;touch-action:pan-y;}
.card-scene{width:100%;max-width:400px;}
.card-wrap{
  width:100%;aspect-ratio:3/4.2;
  border-radius:18px;display:flex;flex-direction:column;
  box-shadow:0 12px 40px rgba(0,0,0,.6);
  cursor:pointer;
}
.card-wrap.is-question{background:var(--crd);border:1px solid var(--brd2);}
.card-wrap.is-answer  {background:var(--sur2);border:1px solid var(--brd2);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.card-wrap.anim{animation:cardIn .25s ease;}

@keyframes flipOut{from{transform:perspective(600px) rotateY(0deg);}to{transform:perspective(600px) rotateY(-90deg);}}
@keyframes flipIn {from{transform:perspective(600px) rotateY(90deg);}to{transform:perspective(600px) rotateY(0deg);}}
.card-wrap.flip-out{animation:flipOut .18s ease-in forwards;}
.card-wrap.flip-in {animation:flipIn  .18s ease-out forwards;}
.card-tag{padding:14px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pill{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:100px;}
.pill-q{background:var(--acc-dim);color:var(--txt2);border:1px solid var(--acc-border);}
.pill-a{background:rgba(255,255,255,.12);color:var(--txt);border:1px solid rgba(255,255,255,.2);}
.card-num{font-size:10px;color:var(--txt3);margin-left:auto;font-variant-numeric:tabular-nums;}
.card-body{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 20px;overflow-y:auto;}
.txt-q{font-size:clamp(15px,4.5vw,20px);line-height:1.45;text-align:center;color:var(--txt);font-weight:600;}
.txt-a{font-size:clamp(12px,3.2vw,15px);line-height:1.65;text-align:center;color:var(--txt);}
.txt-a strong{color:#fff;font-weight:700;}
.txt-a em{color:var(--txt2);font-style:normal;font-weight:500;}
.txt-a code{font-size:.85em;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:4px;color:var(--txt);font-family:monospace;border:1px solid var(--brd2);}
.card-hint{padding:0 16px 12px;text-align:center;font-size:10px;color:var(--txt3);opacity:.55;flex-shrink:0;}

/* ── STUDY CONTROLS ── */
.study-controls{padding:8px 16px 28px;flex-shrink:0;}
.ctrl-row{display:flex;gap:8px;margin-bottom:8px;}
.btn-nav{
  flex:1;padding:13px;border:1px solid var(--brd);border-radius:12px;
  background:var(--sur);color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;font-weight:600;font-size:13px;
}
.btn-nav:active{background:var(--sur2);}
.btn-flip{
  background:var(--txt)!important;border-color:var(--txt)!important;
  color:var(--bg)!important;flex:2;
}
.btn-flip:active{opacity:.85!important;}
.btn-shuf{
  width:100%;padding:12px;border:1px solid var(--brd);border-radius:12px;
  background:transparent;color:var(--txt3);font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-shuf:active{background:var(--sur);}

/* ── RATING BUTTONS ── */
.rate-row{display:none;gap:8px;margin-bottom:8px;}
.rate-row.visible{display:flex;}
.btn-rate{
  flex:1;padding:13px 6px;border:none;border-radius:12px;
  cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:opacity .15s;
}
.btn-rate:active{opacity:.8;}
.btn-rate .rate-icon{font-size:16px;line-height:1;}
.btn-easy {background:#1a3a1a;color:#4ade80;border:1px solid #2d5a2d;}
.btn-medio{background:#3a2e0a;color:#facc15;border:1px solid #5a4510;}
.btn-hard {background:#3a1010;color:#f87171;border:1px solid #5a2020;}
/* hide nav row when rating is shown */
.ctrl-row.hidden{display:none;}

/* queue counter badge */
.queue-badge{
  font-size:10px;color:var(--txt3);
  background:var(--sur2);border:1px solid var(--brd);
  border-radius:100px;padding:2px 8px;font-variant-numeric:tabular-nums;
}

/* ── DONE ── */
.done-icon{font-size:52px;margin-bottom:16px;}
.done-title{font-size:26px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:13px;color:var(--txt2);margin-bottom:32px;}
.done-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;}
.done-btns button{padding:14px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.done-btns button:active{opacity:.8;}
.bp{background:var(--txt);color:var(--bg);}
.bs{background:var(--sur);color:var(--txt);border:1px solid var(--brd)!important;}

@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.card-wrap.anim{animation:cardIn .28s ease;}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div class="screen active" id="home">
  <div class="home-top">
    <div class="app-label">Oposici&#243;n RFIR</div>
    <div class="app-title">Radiof&#237;sica<br>Hospitalaria</div>
    <div class="app-sub">21 temas &middot; Flashcards para el examen</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-n" id="statCards">0</div><div class="stat-l">Tarjetas</div></div>
    <div class="stat"><div class="stat-n" id="statTopics">0/21</div><div class="stat-l">Temas</div></div>
  </div>

  <div class="rating-grid">
    <div class="rcell">
      <div class="rcell-dot" style="color:#4ade80">&#9679;</div>
      <div class="rcell-n" id="rcEasy">0</div>
      <div class="rcell-l">F&#225;cil</div>
    </div>
    <div class="rcell">
      <div class="rcell-dot" style="color:#facc15">&#9679;</div>
      <div class="rcell-n" id="rcMedio">0</div>
      <div class="rcell-l">Medio</div>
    </div>
    <div class="rcell">
      <div class="rcell-dot" style="color:#f87171">&#9679;</div>
      <div class="rcell-n" id="rcHard">0</div>
      <div class="rcell-l">Dif&#237;cil</div>
    </div>
    <div class="rcell">
      <div class="rcell-dot" style="color:var(--txt3)">&#9675;</div>
      <div class="rcell-n" id="rcUnseen">0</div>
      <div class="rcell-l">Sin ver</div>
    </div>
  </div>

  <div class="study-all-wrap">
    <button class="btn-study-all" id="btnStudyAll">
      Estudiar todo
      <span class="cnt" id="allCount">0 tarjetas</span>
    </button>
  </div>

  <div class="topics-label">Temario</div>
  <div class="topic-list" id="topicList"></div>
</div>

<!-- ═══ STUDY ═══ -->
<div class="screen" id="study">
  <div class="shdr">
    <button class="btn-back" id="btnBack">&#8592;</button>
    <div class="deck-name" id="deckName">Tema</div>
    <div class="prog-txt" id="progTxt">1/1</div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>

  <div class="card-area" id="cardArea">
    <div class="card-scene">
      <div class="card-wrap" id="cardWrap">
        <div class="card-tag"><span class="pill" id="cardPill">Pregunta</span><span class="card-num" id="cardNum">01</span></div>
        <div class="card-body"><div id="cardContent"></div></div>
        <div class="card-hint" id="cardHint">Toca para ver la respuesta &bull; Desliza para navegar</div>
      </div>
    </div>
  </div>

  <div class="study-controls">
    <!-- Rating row: shown after flipping -->
    <div class="rate-row" id="rateRow">
      <button class="btn-rate btn-easy"  id="btnEasy"><span class="rate-icon">&#128994;</span>F&#225;cil</button>
      <button class="btn-rate btn-medio" id="btnMedio"><span class="rate-icon">&#128993;</span>Medio</button>
      <button class="btn-rate btn-hard"  id="btnHard"><span class="rate-icon">&#128308;</span>Dif&#237;cil</button>
    </div>
    <!-- Nav row: shown while viewing question -->
    <div class="ctrl-row" id="navRow">
      <button class="btn-nav" id="btnPrev">&#8592; Ant</button>
      <button class="btn-nav btn-flip" id="btnFlip">&#8635; Voltear</button>
      <button class="btn-nav" id="btnNext">Sig &#8594;</button>
    </div>
    <button class="btn-shuf" id="btnShuf">&#128256; Barajar &nbsp;<span class="queue-badge" id="queueBadge">0 pendientes</span></button>
  </div>
</div>

<!-- ═══ DONE ═══ -->
<div class="screen" id="done">
  <div class="done-icon">&#10003;</div>
  <div class="done-title">Completado</div>
  <div class="done-sub" id="doneSub">Has repasado todas las tarjetas</div>
  <div class="done-btns">
    <button class="bp" id="btnRestart">Repetir en orden</button>
    <button class="bp" id="btnRestartS">&#128256; Repetir en aleatorio</button>
    <button class="bs" id="btnHome2">&#8592; Volver al inicio</button>
  </div>
</div>

<script>
(function() {
"use strict";

// ================================================================
//  TEMARIO OFICIAL
//  Para a&#241;adir tarjetas a un tema:
//  Busca el tema por su num y a&#241;ade objetos { q:"...", a:"..." }
//  a su array cards.
// ================================================================
var TOPICS = [
  { num:1,  name:"Magnitudes y Unidades",         cards:[] },
  { num:2,  name:"Matem&#225;ticas",                      cards:[] },
  { num:3,  name:"Estad&#237;stica y Probabilidad",       cards:[] },
  { num:4,  name:"Inform&#225;tica",                      cards:[] },
  { num:5,  name:"Semiconductores",                cards:[] },
  { num:6,  name:"Electr&#243;nica",                      cards:[] },
  { num:7,  name:"F&#237;sica Molecular",                 cards:[] },
  { num:8,  name:"Estado S&#243;lido",                    cards:[] },
  { num:9,  name:"Aceleradores",                   cards:[] },
  {
    num:10,
    name:"Interacci&#243;n Radiaci&#243;n Materia",
    cards:[
      // ── CLASIFICACI&#211;N DE RADIACIONES ──────────────────────
      {
        q:"&#191;Qu&#233; es la ionizaci&#243;n?",
        a:"Ocurre cuando <strong>E<sub>inc</sub> &gt; E<sub>enlace</sub></strong>: el electr&#243;n abandona el &#225;tomo creando un <em>i&#243;n positivo</em>.<br>Ionizaci&#243;n total: <code>I = N/W</code><br>W<sub>aire</sub> = 33 eV/par"
      },
      {
        q:"&#191;Qu&#233; es la excitaci&#243;n?",
        a:"E<sub>exc</sub> &lt; E<sub>enlace</sub>: el e&#8315; <strong>no abandona</strong> el &#225;tomo, salta a capas superiores. Al bajar libera energ&#237;a electromagn&#233;tica."
      },
      {
        q:"&#191;Diferencia entre radiaci&#243;n directa e indirectamente ionizante?",
        a:"<strong>Directamente:</strong> part&#237;culas con carga (e&#8315; r&#225;pidos, hadrones). Transmiten energ&#237;a por interacciones coulombianas.<br><strong>Indirectamente:</strong> sin carga (EM, neutrones). Primero generan una part&#237;cula cargada que luego ioniza."
      },
      {
        q:"&#191;Rangos de energ&#237;a de los Rayos X?",
        a:"<strong>Blandos:</strong> 0,1&#8211;20 keV<br><strong>Diagn&#243;stico:</strong> 20&#8211;120 keV<br><strong>Ortovoltaje:</strong> 120&#8211;300 keV<br><strong>Energ&#237;a media:</strong> 300 keV&#8211;1 MeV<br><strong>Megavoltaje:</strong> &gt;1 MeV"
      },
      {
        q:"&#191;Diferencia de origen entre Rayos X y Rayos &#947;?",
        a:"<strong>RX:</strong> origen <em>electr&#243;nico</em> (transiciones entre capas at&#243;micas o frenado de e&#8315; = Bremsstrahlung).<br><strong>Rayos &#947;:</strong> origen <em>nuclear</em> (desexcitaciones nucleares o aniquilaci&#243;n materia&#8211;antimateria)."
      },
      {
        q:"&#191;C&#243;mo se clasifican los neutrones por energ&#237;a?",
        a:"Ultrafr&#237;os (~&#956;eV) &bull; Fr&#237;os (~meV) &bull; T&#233;rmicos (~0,025 eV) &bull; Lentos (~1 eV) &bull; Intermedios (0,5 eV&#8211;10 keV) &bull; <strong>R&#225;pidos (0,1&#8211;10 MeV)</strong> &bull; Alta energ&#237;a (&gt;100 MeV)"
      },
      // ── DESINTEGRACIONES Y ACTIVIDAD ─────────────────────────
      {
        q:"&#191;Cu&#225;l es la ley exponencial de desintegraci&#243;n?",
        a:"<code>N(t) = N&#8320; &middot; e<sup>&#8722;&#955;t</sup></code><br>N&#8320; = n&#250;cleos iniciales; &#955; = constante de desintegraci&#243;n [T&#8315;&#185;]"
      },
      {
        q:"&#191;Qu&#233; es la semivida T&#189; y la vida media &#964;?",
        a:"<strong>T&#189; = ln2 / &#955;</strong> &#8594; tiempo para reducir N a la mitad.<br><strong>&#964; = 1/&#955;</strong> &#8594; tiempo promedio de vida de un n&#250;cleo."
      },
      {
        q:"&#191;C&#243;mo se define la actividad A(t)?",
        a:"<code>A(t) = A&#8320; &middot; e<sup>&#8722;&#955;t</sup> = &#955; &middot; N(t)</code><br>Unidades: <strong>Becquerel (Bq)</strong> = 1 desint/s<br>1 Ci = 3,7 &times; 10<sup>10</sup> Bq"
      },
      {
        q:"&#191;Qu&#233; es la actividad espec&#237;fica?",
        a:"<code>A<sub>esp</sub> = (&#955; / M<sub>i</sub>) &middot; N<sub>A</sub> &middot; e<sup>&#8722;&#955;t</sup></code><br>Para compuestos mixtos:<br><code>A<sub>esp</sub> = &#955; &middot; m&#8321;N<sub>A</sub> / [A(m&#8321;+m&#8322;)]</code>"
      },
      {
        q:"&#191;Qu&#233; es la actividad parcial y la fracci&#243;n de desintegraci&#243;n?",
        a:"Varias v&#237;as: <code>A<sub>i</sub> = &#955;<sub>i</sub> &middot; N(t)</code><br>Fracci&#243;n: <code>f<sub>i</sub> = &#955;<sub>i</sub> / &#955;</code><br>La suma de todas las &#955;<sub>i</sub> da &#955; total."
      },
      {
        q:"&#191;Qu&#233; es el periodo biol&#243;gico efectivo?",
        a:"<code>1/T<sub>ef</sub> = 1/T&#189; + 1/T<sub>biol</sub></code><br>Combina la eliminaci&#243;n radiactiva y la biol&#243;gica."
      },
      {
        q:"&#191;Qu&#233; es el equilibrio secular?",
        a:"Cuando &#955;<sub>B</sub> &gt;&gt; &#955;<sub>A</sub> y t &gt;&gt; T&#189;(B):<br><strong>A<sub>B</sub> = A<sub>A</sub></strong> &#8594; el padre marca el ritmo de desintegraci&#243;n."
      },
      {
        q:"&#191;Qu&#233; es el equilibrio transitorio?",
        a:"Cuando &#955;<sub>B</sub> &gt; &#955;<sub>A</sub>:<br><code>A<sub>B</sub>/A<sub>A</sub> = &#955;<sub>B</sub>/(&#955;<sub>B</sub>&#8722;&#955;<sub>A</sub>) &gt; 1</code><br>La actividad del hijo supera la del padre."
      },
      {
        q:"&#191;Qu&#233; describe la ecuaci&#243;n de Bateman?",

        q:"&#191;Qu&#233; es la masa cr&#237;tica?",
        a:"Masa m&#237;nima para que la <strong>reacci&#243;n en cadena de fisi&#243;n</strong> se desarrolle de forma acelerada y explosiva."
      },
      {
        q:"&#191;Qu&#233; es la c&#225;mara de niebla de Wilson?",
        a:"Detecta part&#237;culas ionizantes. Vapor de agua <strong>superenfriado y supersaturado</strong>. La part&#237;cula ioniza el vapor &#8594; n&#250;cleos de condensaci&#243;n &#8594; traza visible.<br>&bull; Part&#237;cula &#945;: traza <em>ancha y recta</em><br>&bull; Electr&#243;n: traza <em>fina con deflexiones</em>"
      }
    ]
  },
  { num:11, name:"Detectores",                    cards:[] },
  { num:12, name:"Protecci&#243;n Radiol&#243;gica",            cards:[] },
  { num:13, name:"Aplicaciones M&#233;dicas",               cards:[] },
  { num:14, name:"F&#237;sica Cu&#225;ntica",                    cards:[] },
  { num:15, name:"F&#237;sica Nuclear",                    cards:[] },
  { num:16, name:"Part&#237;culas",                         cards:[] },
  { num:17, name:"Termodin&#225;mica",                      cards:[] },
  { num:18, name:"Electromagnetismo",              cards:[] },
  { num:19, name:"Mec&#225;nica",                           cards:[] },
  { num:20, name:"Relatividad",                    cards:[] },
  { num:21, name:"&#211;ptica",                            cards:[] }
];

// ── STATE ─────────────────────────────────────────────────────────
// queue: cards still to master this session (pending[0] = current card)
// done:  count of cards marked Easy (mastered this session)
var pending = [], done = 0;
var deckSource = null;
var flipped = false;
var seenTotal = 0;
// Cumulative rating counters (persist across sessions within the page)
var cntEasy = 0, cntMedio = 0, cntHard = 0;
// Per-card last rating: key = card object reference, value = "easy"|"medio"|"hard"
var cardRatings = [];
var tx0=0, ty0=0, tt0=0, wasSwiping=false;

// ── HELPERS ───────────────────────────────────────────────────────
function totalCards() {
  var n=0; for(var i=0;i<TOPICS.length;i++) n+=TOPICS[i].cards.length; return n;
}
function topicsWithCards() {
  var n=0; for(var i=0;i<TOPICS.length;i++) if(TOPICS[i].cards.length>0) n++; return n;
}
function getAllCards() {
  var out=[];
  for(var i=0;i<TOPICS.length;i++) for(var j=0;j<TOPICS[i].cards.length;j++) out.push(TOPICS[i].cards[j]);
  return out;
}

// ── SCREENS ───────────────────────────────────────────────────────
function show(id) {
  var all=document.querySelectorAll(".screen");
  for(var i=0;i<all.length;i++) all[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

// ── HOME ──────────────────────────────────────────────────────────
function initHome() {
  var total=totalCards();
  document.getElementById("statCards").textContent = total;
  document.getElementById("statTopics").textContent = topicsWithCards()+"/21";
  document.getElementById("allCount").textContent = total+" tarjeta"+(total!==1?"s":"");

  // Rating counters
  var rated = cntEasy + cntMedio + cntHard;
  var unseen = Math.max(0, total - rated);
  document.getElementById("rcEasy").textContent   = cntEasy;
  document.getElementById("rcMedio").textContent  = cntMedio;
  document.getElementById("rcHard").textContent   = cntHard;
  document.getElementById("rcUnseen").textContent = unseen;

  var tl=document.getElementById("topicList");
  tl.innerHTML="";
  for(var i=0;i<TOPICS.length;i++) {
    (function(t) {
      var has=t.cards.length>0;

      // Wrapper div (not a button) so we can have two independent clickable areas
      var wrap=document.createElement("div");
      wrap.style.cssText="display:flex;align-items:center;gap:0;background:var(--bg);";

      // Main topic button
      var btn=document.createElement("button");
      btn.className="topic-row "+(has?"has-cards":"empty");
      btn.style.cssText="flex:1;border-radius:0;";
      btn.innerHTML=
        "<div class=\"topic-num\">T"+t.num+"</div>"+
        "<div class=\"topic-info\">"+
          "<div class=\"topic-name\">"+t.name+"</div>"+
          "<div class=\"topic-meta\">"+(has ? t.cards.length+" tarjeta"+(t.cards.length!==1?"s":"") : "Sin tarjetas a&#250;n")+"</div>"+
        "</div>"+
        "<div class=\"topic-arrow\">"+(has?"&#8250;":"")+"</div>";
      if(has) btn.addEventListener("click",function(){startTopic(t);});
      wrap.appendChild(btn);

      // Reset button (only for topics with cards)
      if(has) {
        var rst=document.createElement("button");
        rst.className="topic-reset";
        rst.style.cssText="margin-right:16px;";
        rst.textContent="Reset";
        rst.addEventListener("click",function(e){
          e.stopPropagation();
          resetTopic(t);
        });
        wrap.appendChild(rst);
      }

      tl.appendChild(wrap);
    })(TOPICS[i]);
  }
}

// ── STUDY ─────────────────────────────────────────────────────────

// Build a weighted, ordered deck from a cards array using stored ratings:
//   hard    → appears 3 times, at the front
//   unrated → appears 2 times, in the middle
//   medio   → appears 1 time,  in the middle
//   easy    → appears 1 time,  at the end
function buildDeck(cards) {
  var hard=[], unrated=[], medio=[], easy=[];
  for(var i=0; i<cards.length; i++) {
    var r = getRating(cards[i]);
    if(r === "hard")       hard.push(cards[i]);
    else if(r === "medio") medio.push(cards[i]);
    else if(r === "easy")  easy.push(cards[i]);
    else                   unrated.push(cards[i]);
  }
  // Shuffle each group independently
  doShuffle(hard); doShuffle(unrated); doShuffle(medio); doShuffle(easy);

  var deck = [];
  // Hard cards appear 3 times (spread across session)
  for(var i=0; i<hard.length; i++) deck.push(hard[i]);
  // Unrated and medio interleaved first
  for(var i=0; i<unrated.length; i++) deck.push(unrated[i]);
  for(var i=0; i<medio.length; i++) deck.push(medio[i]);
  // Hard cards a second time in the middle
  for(var i=0; i<hard.length; i++) deck.push(hard[i]);
  // Hard cards a third time near the end
  for(var i=0; i<hard.length; i++) deck.push(hard[i]);
  // Easy cards at the very end (once)
  for(var i=0; i<easy.length; i++) deck.push(easy[i]);

  return deck;
}

function startAll() {
  var cards=getAllCards(); if(!cards.length) return;
  deckSource=cards; pending=buildDeck(cards); done=0;
  beginStudy("Todo el temario");
}
function startTopic(t) {
  deckSource=t.cards; pending=buildDeck(t.cards); done=0;
  beginStudy("T"+t.num+" \u00b7 "+t.name);
}
function beginStudy(name) {
  flipped=false;
  document.getElementById("deckName").textContent=name;
  show("study"); render();
}

// Insert card back into pending at given position (clamped to array length)
function reinsert(card, pos) {
  var insertAt = Math.min(pos, pending.length);
  pending.splice(insertAt, 0, card);
}

function render() {
  if(pending.length === 0) {
    seenTotal += done;
    document.getElementById("doneSub").textContent =
      "Has repasado "+done+" tarjeta"+(done!==1?"s":"");
    show("done"); initHome(); return;
  }

  var c = pending[0];
  var total = done + pending.length;
  var current = done + 1;
  var n = ("0"+current).slice(-2);

  // Show QUESTION side
  var cw = document.getElementById("cardWrap");
  cw.className = "card-wrap is-question";
  document.getElementById("cardPill").className = "pill pill-q";
  document.getElementById("cardPill").textContent = "Pregunta";
  document.getElementById("cardNum").textContent = n+"/"+total;
  document.getElementById("cardContent").className = "txt-q";
  document.getElementById("cardContent").innerHTML = c.q;
  document.getElementById("cardHint").textContent = "Toca para ver la respuesta";

  document.getElementById("progTxt").textContent = current+" / "+total;
  document.getElementById("progBar").style.width = ((done/total)*100)+"%";
  document.getElementById("queueBadge").textContent = pending.length+" pendiente"+(pending.length!==1?"s":"");

  flipped = false;
  showNavMode();

  // entry animation
  cw.classList.remove("anim");
  void cw.offsetWidth;
  cw.classList.add("anim");
}

function showNavMode() {
  document.getElementById("navRow").classList.remove("hidden");
  document.getElementById("rateRow").classList.remove("visible");
}
function showRateMode() {
  document.getElementById("navRow").classList.add("hidden");
  document.getElementById("rateRow").classList.add("visible");
}

function doFlip() {
  var c = pending[0];
  var cw = document.getElementById("cardWrap");

  // Phase 1: rotate out
  cw.classList.remove("flip-in","flip-out");
  void cw.offsetWidth;
  cw.classList.add("flip-out");

  setTimeout(function() {
    // Swap content at the midpoint (card is edge-on)
    if(!flipped) {
      flipped = true;
      cw.className = "card-wrap is-answer";
      document.getElementById("cardPill").className = "pill pill-a";
      document.getElementById("cardPill").textContent = "Respuesta";
      document.getElementById("cardContent").className = "txt-a";
      document.getElementById("cardContent").innerHTML = c.a;
      document.getElementById("cardHint").textContent = "Val\u00f3rate para continuar";
      showRateMode();
    } else {
      flipped = false;
      cw.className = "card-wrap is-question";
      document.getElementById("cardPill").className = "pill pill-q";
      document.getElementById("cardPill").textContent = "Pregunta";
      document.getElementById("cardContent").className = "txt-q";
      document.getElementById("cardContent").innerHTML = c.q;
      document.getElementById("cardHint").textContent = "Toca para ver la respuesta";
      showNavMode();
    }
    // Phase 2: rotate in
    cw.classList.add("flip-in");
  }, 180);
}

// ── RATING LOGIC ──────────────────────────────────────────────────
function getRating(card) {
  for(var i=0; i<cardRatings.length; i++) {
    if(cardRatings[i].card === card) return cardRatings[i].rating;
  }
  return null;
}
function setRating(card, rating) {
  for(var i=0; i<cardRatings.length; i++) {
    if(cardRatings[i].card === card) { cardRatings[i].rating = rating; return; }
  }
  cardRatings.push({ card: card, rating: rating });
}

// Remove stored ratings for all cards in a topic and adjust counters
function resetTopic(t) {
  for(var i=0; i<t.cards.length; i++) {
    var prev = getRating(t.cards[i]);
    if(prev === "easy")  cntEasy  = Math.max(0, cntEasy-1);
    else if(prev === "medio") cntMedio = Math.max(0, cntMedio-1);
    else if(prev === "hard")  cntHard  = Math.max(0, cntHard-1);
    // Remove from cardRatings array
    for(var j=cardRatings.length-1; j>=0; j--) {
      if(cardRatings[j].card === t.cards[i]) { cardRatings.splice(j,1); break; }
    }
  }
  initHome();
}

function rate(difficulty) {
  var card = pending.shift();

  // Subtract previous rating for this card
  var prev = getRating(card);
  if(prev === "easy")  cntEasy--;
  else if(prev === "medio") cntMedio--;
  else if(prev === "hard")  cntHard--;

  // Apply new rating
  if(difficulty === "easy") {
    done++; cntEasy++;
  } else if(difficulty === "medio") {
    cntMedio++;
    reinsert(card, 5);
  } else {
    cntHard++;
    reinsert(card, 2);
  }

  setRating(card, difficulty);
  render();
}

// Nav: browse without rating (no spaced rep effect)
function next() {
  if(pending.length > 1) {
    // move current card to end without rating it
    var card = pending.shift();
    pending.push(card);
    render();
  }
}
function prev() {
  if(pending.length > 1) {
    // move last card to front
    var card = pending.pop();
    pending.unshift(card);
    render();
  }
}

function doShuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
}
function shuffleRender(){
  doShuffle(pending); render();
}

// ── TOUCH + CLICK ON CARD ─────────────────────────────────────────
var ca=document.getElementById("cardArea");
var lastTouchFlip = 0; // timestamp to avoid double-fire on mobile
ca.addEventListener("touchstart",function(e){tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;tt0=Date.now();wasSwiping=false;},{passive:true});
ca.addEventListener("touchmove",function(e){var dx=e.touches[0].clientX-tx0,dy=e.touches[0].clientY-ty0;if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy))wasSwiping=true;},{passive:true});
ca.addEventListener("touchend",function(e){
  var dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0,dt=Date.now()-tt0;
  if(wasSwiping&&Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0)next();else prev();}
  else if(!wasSwiping&&dt<400&&Math.abs(dx)<15&&Math.abs(dy)<15){lastTouchFlip=Date.now();doFlip();}
  wasSwiping=false;
},{passive:true});

// Click on the card flips it (desktop). Ignored on mobile to avoid double-fire.
document.getElementById("cardWrap").addEventListener("click",function(){
  if(Date.now()-lastTouchFlip > 400) doFlip();
});

// ── BUTTONS ───────────────────────────────────────────────────────
document.getElementById("btnStudyAll").addEventListener("click",startAll);
document.getElementById("btnBack").addEventListener("click",function(){show("home");initHome();});
document.getElementById("btnPrev").addEventListener("click",prev);
document.getElementById("btnFlip").addEventListener("click",doFlip);
document.getElementById("btnNext").addEventListener("click",next);
document.getElementById("btnShuf").addEventListener("click",shuffleRender);
document.getElementById("btnEasy").addEventListener("click",function(){rate("easy");});
document.getElementById("btnMedio").addEventListener("click",function(){rate("medio");});
document.getElementById("btnHard").addEventListener("click",function(){rate("hard");});
document.getElementById("btnRestart").addEventListener("click",function(){
  if(!deckSource)return; pending=buildDeck(deckSource); done=0; show("study"); render();
});
document.getElementById("btnRestartS").addEventListener("click",function(){
  if(!deckSource)return; pending=buildDeck(deckSource); doShuffle(pending); done=0; show("study"); render();
});
document.getElementById("btnHome2").addEventListener("click",function(){show("home");initHome();});

// ── KEYBOARD ──────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  if(!document.getElementById("study").classList.contains("active"))return;
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault(); if(flipped) rate("medio"); else next();}
  else if(e.key==="ArrowLeft"){e.preventDefault(); prev();}
  else if(e.key==="Enter"||e.key==="f") doFlip();
  else if(e.key==="1") rate("easy");
  else if(e.key==="2") rate("medio");
  else if(e.key==="3") rate("hard");
});

// ── INIT ──────────────────────────────────────────────────────────
initHome();
})();
</script>
